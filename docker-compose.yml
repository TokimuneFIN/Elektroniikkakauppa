version: '3.8'
services:
  db:
    image: mariadb:10.11
    restart: always
    environment:
      MARIADB_USER: vaadinstart
      MARIADB_PASSWORD: vaadinstart
      MARIADB_DATABASE: vaadinstart
      MARIADB_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql

volumes:
  db-data: